apiVersion: apps/v1
kind: Deployment
metadata:
  name: familybridge
  labels:
    app: familybridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: familybridge
  template:
    metadata:
      labels:
        app: familybridge
    spec:
      containers:
        - name: familybridge
          image: familybridgeacr.azurecr.io/familybridge:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
