server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy to Azure AI Foundry (hides API key from browser)
    location /api/ai {
        proxy_pass https://aifh-t4-aifg2026-artem.services.ai.azure.com/api/projects/proj-t4-artem/openai/v1/responses;
        proxy_set_header Content-Type application/json;
        proxy_set_header api-key REDACTED;
        proxy_ssl_server_name on;
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
